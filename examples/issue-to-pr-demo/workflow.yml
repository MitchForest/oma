# The vision-file shape, runnable offline: plan (with your approval), then an
# execute/review loop with a different model per stage until the judge
# approves. Models are deterministic module:// fakes; swap them for real
# model names to run live.
name: issue-to-pr
title: Issue in, reviewed change out

inputs:
  issue:
    required: true
    description: Issue number or a short description of what to fix

stages:
  plan:
    agent:
      prompt: You plan minimal fixes for issues.
      model: "module://@oma/example-issue-to-pr-demo#createPlannerModel"
    approve: true
    prompt: |
      Plan a minimal fix for issue {inputs.issue}. List what will change and why.
    output:
      summary: string

  execute:
    agent:
      prompt: You implement approved plans.
      model: "module://@oma/example-issue-to-pr-demo#createCoderModel"
    prompt: |
      Implement the approved plan: {stages.plan.summary}
    reprompt: |
      The reviewer requested changes: {stages.review.feedback}
      Address every point and summarize what you changed.
    output:
      summary: string

  review:
    agent:
      prompt: You review implementations against their plan and return a strict verdict.
      model: "module://@oma/example-issue-to-pr-demo#createJudgeModel"
    prompt: |
      Review the implementation: {stages.execute.summary}
      It must fully cover the plan: {stages.plan.summary}
    reprompt: |
      Re-review after the revision: {stages.execute.summary}
    output:
      verdict: approve | revise
      feedback: string

loop:
  over: [execute, review]
  until: review.verdict == approve
  max: 3

policy:
  maxSteps: 8
