name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: oma
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Runs the postgres session-store contract suite (skipped when unset).
      DATABASE_URL: postgres://postgres:oma@127.0.0.1:5432/postgres
      # Runs the docker sandbox contract suite (skipped when unset).
      OMA_DOCKER_IMAGE: alpine:3.20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: docker pull alpine:3.20
      - run: bun install --frozen-lockfile
      - run: bun run check
